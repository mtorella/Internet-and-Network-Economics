<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f1117; font-family: 'Segoe UI', sans-serif; color: #ccc; overflow: hidden; }

  #container { position: relative; width: 100vw; height: 100vh; }
  svg { width: 100%; height: 100%; }

  .arc { transition: opacity 0.2s; cursor: default; }
  .arc.dimmed { opacity: 0.04; }
  .arc.highlighted { opacity: 1 !important; }

  .node-ita { cursor: pointer; }
  .node-ita:hover circle { stroke: white; stroke-width: 2px; }

  .node-foreign { cursor: default; }

  .label-ita { font-size: 11px; fill: #ddd; pointer-events: none; }
  .label-country {
    font-size: 13px; font-weight: 700; cursor: pointer;
    transition: opacity 0.2s;
  }
  .label-country:hover { opacity: 0.7; }
  .label-country.active { text-decoration: underline; }

  /* Tooltip */
  #tooltip {
    position: absolute; pointer-events: none;
    background: #1a1d27; border: 1px solid #333344;
    border-radius: 8px; padding: 12px 16px;
    font-size: 12px; color: #ccc;
    max-width: 240px; opacity: 0;
    transition: opacity 0.15s;
    line-height: 1.6;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  #tooltip.visible { opacity: 1; }
  #tooltip .sector-name { font-size: 14px; font-weight: 700; color: white; margin-bottom: 6px; }
  #tooltip .stat { display: flex; justify-content: space-between; gap: 16px; }
  #tooltip .stat span:last-child { color: white; font-weight: 600; }
  #tooltip .partners-title { margin-top: 8px; margin-bottom: 3px; color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  #tooltip .partner-row { display: flex; justify-content: space-between; gap: 12px; }

  /* Legend */
  #legend {
    position: absolute; bottom: 20px; left: 20px;
    background: rgba(26,29,39,0.95); border: 1px solid #333344;
    border-radius: 8px; padding: 12px 16px; font-size: 11px;
  }
  #legend .leg-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  #legend .leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* Instructions */
  #instructions {
    position: absolute; top: 16px; right: 20px;
    background: rgba(26,29,39,0.9); border: 1px solid #333344;
    border-radius: 8px; padding: 10px 14px; font-size: 11px; color: #888;
    line-height: 1.8;
  }

  /* Active country filter indicator */
  #filter-indicator {
    position: absolute; top: 16px; left: 50%;
    transform: translateX(-50%);
    background: rgba(26,29,39,0.95); border: 1px solid #444;
    border-radius: 20px; padding: 6px 16px;
    font-size: 12px; color: #aaa;
    opacity: 0; transition: opacity 0.2s;
    pointer-events: none;
  }
  #filter-indicator.visible { opacity: 1; }
</style>

const svg = d3.select("#svg");
const tooltip = document.getElementById("tooltip");
const filterIndicator = document.getElementById("filter-indicator");

// ── Layout ──────────────────────────────────────────────────────────────────
const W = window.innerWidth, H = window.innerHeight;
const PAD = { left: 180, right: 180, top: 60, bottom: 40 };

// Map data coords [-1.6, 1.6] x [-1, 1] → screen
const xScale = d3.scaleLinear().domain([-2.0, 2.0]).range([PAD.left, W - PAD.right]);
const yScale = d3.scaleLinear().domain([-1.15, 1.15]).range([H - PAD.bottom, PAD.top]);

function px(node) { return { x: xScale(node.x), y: yScale(node.y) }; }

// Index nodes by id
const nodeMap = {};
RAW.nodes.forEach(n => { nodeMap[n.id] = n; });

// State
let activeCountry = null;
let hoveredNode   = null;

// ── Main group ───────────────────────────────────────────────────────────────
const g = svg.append("g").attr("id", "main");

// Title
svg.append("text")
  .attr("x", W / 2).attr("y", 28)
  .attr("text-anchor", "middle")
  .attr("font-size", 15).attr("font-weight", "700").attr("fill", "white")
  .text("Italy in the Global Supply Network — OECD ICIO 2022");

svg.append("text")
  .attr("x", W / 2).attr("y", 46)
  .attr("text-anchor", "middle")
  .attr("font-size", 11).attr("fill", "#666")
  .text("Centre: Italian sectors sorted by PageRank  ·  Sides: top 10 trading partners  ·  Arcs: top 5% flows");

// ── Draw arcs ────────────────────────────────────────────────────────────────
function bezierPath(src, tgt) {
  const p0 = px(nodeMap[src]);
  const p1 = px(nodeMap[tgt]);
  const cx  = (p0.x + p1.x) / 2;
  const bulge = Math.abs(p1.x - p0.x) * 0.55;
  const dir = (p0.x < W/2 || p1.x < W/2) ? -1 : 1;
  const cpx = cx + dir * bulge;
  const cpy = (p0.y + p1.y) / 2;
  return `M${p0.x},${p0.y} Q${cpx},${cpy} ${p1.x},${p1.y}`;
}

const arcGroup = g.append("g").attr("id", "arcs");

const arcs = arcGroup.selectAll(".arc")

  .enter().append("path")
  .attr("class", d => `arc arc-country-${d.country}`)
  .attr("d", d => bezierPath(d.source, d.target))
  .attr("fill", "none")
  .attr("stroke", d => d.color)
  .attr("stroke-width", d => d.width)
  .attr("stroke-opacity", d => d.alpha)
  .attr("data-source", d => d.source)
  .attr("data-target", d => d.target)
  .attr("data-country", d => d.country);

// ── Draw foreign nodes ────────────────────────────────────────────────────────
const foreignGroup = g.append("g").attr("id", "foreign-nodes");

foreignGroup.selectAll(".node-foreign")
  .data(RAW.nodes.filter(n => !n.is_ita))
  .enter().append("circle")
  .attr("class", "node-foreign")
  .attr("cx", d => px(d).x)
  .attr("cy", d => px(d).y)
  .attr("r",  d => Math.sqrt(d.size) * 0.9)
  .attr("fill", d => d.color)
  .attr("stroke", "#888")
  .attr("stroke-width", 0.3)
  .attr("opacity", 0.75);

// ── Draw Italian nodes ────────────────────────────────────────────────────────
const itaGroup = g.append("g").attr("id", "ita-nodes");

const itaNodes = itaGroup.selectAll(".node-ita")
  .data(RAW.nodes.filter(n => n.is_ita))
  .enter().append("g")
  .attr("class", "node-ita")
  .attr("transform", d => `translate(${px(d).x},${px(d).y})`);

itaNodes.append("circle")
  .attr("r", d => Math.sqrt(d.size) * 1.4)
  .attr("fill", d => d.color)
  .attr("stroke", "white")
  .attr("stroke-width", 0.6);

// ── Italian labels (alternating) ─────────────────────────────────────────────
const labelGroup = g.append("g").attr("id", "ita-labels");

RAW.nodes.filter(n => n.is_ita).forEach((n, i) => {
  const { x, y } = px(n);
  const right = i % 2 === 0;
  labelGroup.append("text")
    .attr("class", "label-ita")
    .attr("x", x + (right ? 10 : -10))
    .attr("y", y)
    .attr("dy", "0.35em")
    .attr("text-anchor", right ? "start" : "end")
    .text(n.label);
});

// ── Country labels ────────────────────────────────────────────────────────────
const countryLabelGroup = g.append("g").attr("id", "country-labels");

RAW.country_labels.forEach(cl => {
  countryLabelGroup.append("text")
    .attr("class", `label-country label-country-${cl.country}`)
    .attr("x", xScale(cl.x) + (cl.align === "right" ? -14 : 14))
    .attr("y", yScale(cl.y))
    .attr("dy", "0.35em")
    .attr("text-anchor", cl.align === "right" ? "end" : "start")
    .attr("fill", cl.color)
    .text(cl.country)
    .on("click", function() { handleCountryClick(cl.country); });
});

// ── Interactions ──────────────────────────────────────────────────────────────

function getConnectedIds(nodeId) {
  const ids = new Set();
  RAW.edges.forEach(e => {
    if (e.source === nodeId) ids.add(e.target);
    if (e.target === nodeId) ids.add(e.source);
  });
  return ids;
}

function applyHover(nodeId) {
  hoveredNode = nodeId;
  const connected = getConnectedIds(nodeId);

  // Filter arcs by both hover and active country
  arcs.each(function(d) {
    const el = d3.select(this);
    const isConnected = d.source === nodeId || d.target === nodeId;
    const countryOk   = !activeCountry || d.country === activeCountry;

    if (!isConnected) {
      el.classed("dimmed", true).classed("highlighted", false);
    } else if (countryOk) {
      el.classed("dimmed", false).classed("highlighted", true)
        .raise();
    } else {
      el.classed("dimmed", true).classed("highlighted", false);
    }
  });
}

function clearHover() {
  hoveredNode = null;
  applyCountryFilter(activeCountry);  // revert to country filter state
}

function applyCountryFilter(country) {
  activeCountry = country;
  arcs.each(function(d) {
    const el = d3.select(this);
    if (!country) {
      el.classed("dimmed", false).classed("highlighted", false)
        .attr("stroke-opacity", d.alpha);
    } else {
      const match = d.country === country;
      el.classed("dimmed", !match).classed("highlighted", false)
        .attr("stroke-opacity", match ? Math.min(d.alpha * 1.8, 0.9) : d.alpha * 0.05);
    }
  });
}

function handleCountryClick(country) {
  if (activeCountry === country) {
    // Toggle off
    activeCountry = null;
    applyCountryFilter(null);
    filterIndicator.classList.remove("visible");
    d3.selectAll(".label-country").classed("active", false);
  } else {
    activeCountry = country;
    applyCountryFilter(country);
    filterIndicator.textContent = `Showing flows with ${country} — click again to clear`;
    filterIndicator.classList.add("visible");
    d3.selectAll(".label-country").classed("active", false);
    d3.selectAll(`.label-country-${country}`).classed("active", true);
  }
}

// Node hover → tooltip
itaNodes
  .on("mousemove", function(event, d) {
    applyHover(d.id);

    // Build tooltip
    const p3 = d.top3.map(p =>
      `<div class="partner-row"><span>${p.country}</span><span style="color:white">$${p.flow}B</span></div>`
    ).join("");

    tooltip.innerHTML = `
      <div class="sector-name" style="color:${d.color}">${d.label}</div>
      <div class="stat"><span>PageRank</span><span>${d.pagerank.toFixed(3)}%</span></div>
      <div class="stat"><span>In-flow</span><span>$${d.in_strength}B</span></div>
      <div class="stat"><span>Out-flow</span><span>$${d.out_strength}B</span></div>
      ${d.top3.length ? `<div class="partners-title">Top trading partners</div>${p3}` : ""}
    `;

    const tx = event.clientX + 14;
    const ty = event.clientY - 10;
    tooltip.style.left = (tx + 260 > W ? tx - 270 : tx) + "px";
    tooltip.style.top  = Math.min(ty, H - 200) + "px";
    tooltip.classList.add("visible");
  })
  .on("mouseleave", function() {
    clearHover();
    tooltip.classList.remove("visible");
  });

// Background click to clear
svg.on("click", function(event) {
  if (event.target === this) {
    activeCountry = null;
    applyCountryFilter(null);
    filterIndicator.classList.remove("visible");
    d3.selectAll(".label-country").classed("active", false);
  }
});

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener("resize", () => location.reload());
</script>
</body>
